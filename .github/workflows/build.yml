name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:prod

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p artifact/in-out-extension/popup
          cp manifest.json artifact/in-out-extension/
          cp -r dist artifact/in-out-extension/
          cp -r icons artifact/in-out-extension/
          cp popup/popup.html popup/popup.css artifact/in-out-extension/popup/
          cp PRIVACY_POLICY.md artifact/in-out-extension/

      - uses: actions/upload-artifact@v4
        with:
          name: in-out-extension
          path: artifact/in-out-extension
          retention-days: 90

      - name: Create release zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd artifact
          zip -r ../in-out-extension-v${{ steps.version.outputs.version }}.zip in-out-extension/

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --title "in↔out $TAG" \
            --notes "Automated build of in↔out extension $TAG. Download the zip, unzip, and load as an unpacked extension in Chrome." \
            --latest \
            "in-out-extension-v${VERSION}.zip" \
            || echo "Release $TAG already exists, skipping"
